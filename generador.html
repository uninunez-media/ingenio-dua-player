<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Generador de Recurso Multimodal DUA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container": "#edeeef", "primary": "#a30019", "surface-variant": "#e1e3e4", "on-surface": "#191c1d", "surface-container-highest": "#e1e3e4", "surface": "#f8f9fa", "error-container": "#ffdad6", "error": "#ba1a1a", "surface-container-lowest": "#ffffff", "surface-container-high": "#e7e8e9", "outline": "#916f6c", "secondary": "#005eb2", "tertiary": "#00557d" }, fontFamily: { "body": ["Inter"] } } } }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ce1126; border-radius: 10px; }
        #preview-canvas iframe { border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<main class="pb-12 px-6 max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-8 min-h-screen pt-6">
    
    <!-- COLUMNA IZQUIERDA: FORMULARIO -->
<!-- Left Column: Editor Form -->
    <section id="col-formulario" class="w-full lg:w-[400px] xl:w-[450px] flex-shrink-0 space-y-8 transition-all duration-300">
        <div class="space-y-2">
            <h1 class="text-4xl font-extrabold tracking-tight text-on-surface">Generador Multimodal DUA</h1>
        </div>
        
        <div class="grid gap-6">
            <!-- Texto -->
            <div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border-l-4 border-primary">
                <div class="flex items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">description</span>
                    <h2 class="text-xl font-bold">Contenido Base (Texto)</h2>
                </div>
                <textarea id="input-texto" class="w-full bg-surface-container-high border-none rounded-lg p-4 text-sm" placeholder="Resumen o texto para el lector de pantalla..."></textarea>
            </div>

            <!-- Video & Señas -->
            <div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border-l-4 border-secondary">
                <div class="flex items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">movie</span>
                    <h2 class="text-xl font-bold">Video</h2>
                </div>
                <input id="input-video" class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3 mb-6 text-sm" placeholder="URL Video (YouTube o MP4)" type="text"/>
                
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-bold uppercase">Lengua de Señas</span>
                    <button type="button" id="btn-add-sena" class="text-secondary text-xs font-bold flex items-center gap-1"><span class="material-symbols-outlined text-sm">add</span> Añadir Idioma</button>
                </div>
                <div id="contenedor-senas" class="space-y-2"></div>
            </div>

            <!-- Audio -->
            <div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border-l-4 border-tertiary">
                <div class="flex items-center gap-3 mb-4">
                    <span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">headphones</span>
                    <h2 class="text-xl font-bold">Audio</h2>
                </div>
                <input id="input-audio" class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3 text-sm" placeholder="URL Audio (MP3)" type="text"/>
            </div>

            <!-- Pistas de Accesibilidad -->
            <div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border-l-4 border-outline">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-outline" style="font-variation-settings: 'FILL' 1;">universal_currency</span>
                        <h2 class="text-xl font-bold">Pistas de Accesibilidad (.vtt)</h2>
                    </div>
                    <button type="button" id="btn-add-pista" class="text-secondary text-xs font-bold flex items-center gap-1"><span class="material-symbols-outlined text-sm">add</span> Añadir Idioma</button>
                </div>
                <div id="contenedor-pistas" class="space-y-4"></div>
            </div>
        </div>

        <button id="btn-generar" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-opacity-90 active:scale-95 flex items-center justify-center gap-2 shadow-md">
            <span class="material-symbols-outlined">code_blocks</span> Generar Código Moodle
        </button>
    </section>

    <!-- COLUMNA DERECHA: VISTA PREVIA Y CÓDIGO -->
    <aside class="flex-1 lg:sticky lg:top-6 h-fit space-y-6">
        
        <!-- Simulador Dinámico -->
        <div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden flex flex-col border border-surface-variant">
            <div class="bg-surface p-1.5 border-b border-surface-variant flex gap-1 overflow-x-auto">
                <button data-vista="audiovisual" class="sim-tab flex-1 min-w-max py-1 px-2 rounded-md bg-primary text-white font-bold text-[11px] transition-all flex items-center justify-center gap-1 shadow-sm">
                    <span class="material-symbols-outlined text-[14px]">play_circle</span> Audiovisual
                </button>
                <button data-vista="lectura" class="sim-tab flex-1 min-w-max py-1 px-2 rounded-md bg-transparent text-on-surface-variant hover:bg-surface-container font-semibold text-[11px] transition-all flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">auto_stories</span> Lectura
                </button>
                <button data-vista="escucha" class="sim-tab flex-1 min-w-max py-1 px-2 rounded-md bg-transparent text-on-surface-variant hover:bg-surface-container font-semibold text-[11px] transition-all flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">headphones</span> Escucha
                </button>
                <button data-vista="bajoconsumo" class="sim-tab flex-1 min-w-max py-1 px-2 rounded-md bg-transparent text-on-surface-variant hover:bg-surface-container font-semibold text-[11px] transition-all flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">bolt</span> Ligero
                </button>
            </div>

            <div id="preview-canvas" class="p-4 bg-slate-50 min-h-[350px] flex flex-col relative">
                <div id="preview-empty" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 bg-slate-50">
                    <span class="material-symbols-outlined text-on-surface-variant text-5xl mb-3">visibility_off</span>
                    <h3 class="text-lg font-bold">Sin Vista Previa</h3>
                    <p class="text-xs text-on-surface-variant">Configura el recurso y haz clic en "Generar".</p>
                </div>
                <div id="preview-content" class="hidden w-full h-full flex flex-col"></div>
            </div>
        </div>

        <!-- Panel de Código -->
        <div class="bg-slate-900 rounded-xl overflow-hidden shadow-xl">
            <div class="flex items-center justify-between px-4 py-3 bg-slate-800">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-slate-400 text-sm">code</span>
                    <span class="text-xs font-bold text-slate-300 uppercase">Iframe Resultante</span>
                </div>
                <button id="btn-copiar" class="bg-secondary px-3 py-1 rounded text-[11px] font-bold text-white hover:bg-opacity-90 active:scale-95">Copiar</button>
            </div>
            <div class="p-4">
                <textarea id="codigo-resultado" class="w-full bg-transparent border-none text-blue-300 font-mono text-xs focus:ring-0 min-h-[150px] resize-none" placeholder="Aquí aparecerá el código..." readonly></textarea>
            </div>
        </div>
    </aside>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- 1. REFERENCIAS GLOBALES ---
    const contSenas = document.getElementById('contenedor-senas');
    const contPistas = document.getElementById('contenedor-pistas');
    const previewEmpty = document.getElementById('preview-empty');
    const previewContent = document.getElementById('preview-content');
    const codigoResultado = document.getElementById('codigo-resultado');
    const btnCopiar = document.getElementById('btn-copiar');
    const tabs = document.querySelectorAll('.sim-tab');

    // Variable para guardar la URL base del reproductor generado
    let urlGeneradaActual = "";

    // --- 2. PLANTILLAS DE BLOQUES DINÁMICOS ---
    const tplSena = `
        <div class="bloque-sena flex gap-2 items-end p-3 bg-surface-container rounded-lg relative">
            <div class="flex-[1]">
                <span class="text-[10px] font-bold uppercase">Idioma</span>
                <input type="text" class="sena-lang w-full bg-white border-none rounded-md text-sm p-2" placeholder="ej. lsc">
            </div>
            <div class="flex-[3]">
                <span class="text-[10px] font-bold uppercase">URL Video Señas</span>
                <input type="text" class="sena-url w-full bg-white border-none rounded-md text-sm p-2" placeholder="ID o URL YouTube">
            </div>
            <button type="button" class="btn-borrar p-2 text-error hover:bg-error-container rounded-md transition-colors">
                <span class="material-symbols-outlined">delete</span>
            </button>
        </div>`;

    const tplPista = `
        <div class="bloque-pista bg-surface-container p-4 rounded-lg relative border border-surface-variant">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold uppercase">Código Idioma:</span>
                    <input type="text" class="pista-lang w-16 bg-white border-none rounded-md text-xs p-1" placeholder="es">
                </div>
                <button type="button" class="btn-borrar text-error text-xs font-bold flex items-center hover:underline">
                    <span class="material-symbols-outlined text-sm">delete</span> Borrar
                </button>
            </div>
            <div class="grid grid-cols-1 gap-2">
                <input type="text" class="pista-sub w-full bg-white border-none rounded-md text-xs p-2" placeholder="Subtítulos (.vtt)">
                <input type="text" class="pista-cap w-full bg-white border-none rounded-md text-xs p-2" placeholder="Capítulos (.vtt)">
                <input type="text" class="pista-desc w-full bg-white border-none rounded-md text-xs p-2" placeholder="Descripciones (.vtt)">
                <input type="text" class="pista-audesc w-full bg-white border-none rounded-md text-xs p-2" placeholder="Audio-descripción (.mp3)">
            </div>
        </div>`;

    // --- 3. FUNCIONES DE MANIPULACIÓN DEL DOM ---
    document.getElementById('btn-add-sena').onclick = () => contSenas.insertAdjacentHTML('beforeend', tplSena);
    document.getElementById('btn-add-pista').onclick = () => contPistas.insertAdjacentHTML('beforeend', tplPista);
    
    // Delegación de eventos para borrar bloques
    document.body.onclick = (e) => {
        if (e.target.closest('.btn-borrar')) e.target.closest('.bloque-sena, .bloque-pista').remove();
    };

    function extractYouTubeID(url) {
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/);
        return match ? match[1] : url;
    }

    // --- 4. LÓGICA DEL BOTÓN GENERAR ---
    document.getElementById('btn-generar').onclick = () => {
        let params = new URLSearchParams();
        const video = document.getElementById('input-video').value.trim();
        const audio = document.getElementById('input-audio').value.trim();
        const texto = document.getElementById('input-texto').value.trim();
        
        if (video) params.append('v', extractYouTubeID(video));
        if (audio) params.append('audio', audio);

        // Recolectar Señas
        document.querySelectorAll('.bloque-sena').forEach(b => {
            const l = b.querySelector('.sena-lang').value.trim().toLowerCase();
            const u = b.querySelector('.sena-url').value.trim();
            if (l && u) params.append(`ls_${l}`, extractYouTubeID(u));
        });

        // Recolectar Pistas
        document.querySelectorAll('.bloque-pista').forEach(b => {
            const l = b.querySelector('.pista-lang').value.trim().toLowerCase();
            if (!l) return;
            ['sub', 'cap', 'desc', 'audesc'].forEach(t => {
                const v = b.querySelector(`.pista-${t}`).value.trim();
                if (v) params.append(`${t}_${l}`, v);
            });
        });

        const urlBase = "https://uninunez-media.github.io/ingenio-dua-player/dua-lite.html";
        urlGeneradaActual = `${urlBase}?${params.toString()}`;
        
        const iframeCode = `<iframe id="iframe-reproductor" src="${urlGeneradaActual}" width="100%" height="450px" frameborder="0" allowfullscreen></iframe>\n\n<div class="sr-only">${texto}</div>`;
        
        codigoResultado.value = iframeCode;

        // Activar la vista previa
        previewEmpty.classList.add('hidden');
        previewContent.classList.remove('hidden');
        
        // Disparar la pestaña Audiovisual por defecto
        document.querySelector('button[data-vista="audiovisual"]').click();
    };

// --- LÓGICA DE LAS PESTAÑAS DEL SIMULADOR ---
    tabs.forEach(tab => {
        tab.onclick = (e) => {
            // 1. Limpiar todos los botones de forma segura
            tabs.forEach(t => {
                t.classList.remove('bg-primary', 'text-white', 'shadow-sm');
                t.classList.add('bg-transparent', 'text-on-surface-variant');
            });
            // 2. Aplicar color solo al botón clickeado
            e.currentTarget.classList.remove('bg-transparent', 'text-on-surface-variant');
            e.currentTarget.classList.add('bg-primary', 'text-white', 'shadow-sm');

            if (!urlGeneradaActual) return;
            const vista = e.currentTarget.getAttribute('data-vista');
            const textoInput = document.getElementById('input-texto').value.trim();

            if (vista === 'audiovisual') {
                previewContent.innerHTML = `<iframe src="${urlGeneradaActual}" width="100%" height="450px" frameborder="0" allowfullscreen></iframe>`;
            } 
            else if (vista === 'escucha') {
                const urlAudio = new URL(urlGeneradaActual);
                urlAudio.searchParams.set('perfil', 'escucha');
                previewContent.innerHTML = `<iframe src="${urlAudio.href}" width="100%" height="450px" frameborder="0" allowfullscreen></iframe>`;
            }
            else if (vista === 'lectura') {
                if (!textoInput) {
                    previewContent.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center h-full bg-white rounded-lg border">
                            <span class="material-symbols-outlined text-5xl text-gray-300 mb-4">auto_stories</span>
                            <h3 class="text-lg font-bold text-gray-700">Perfil no disponible</h3>
                            <p class="text-sm text-gray-500 max-w-sm mt-2">No se ha ingresado un documento o texto base para la vista de lectura.</p>
                        </div>`;
                }
                else if (textoInput.startsWith('http')) {
                    previewContent.innerHTML = `
                        <div class="w-full bg-white rounded-lg border flex flex-col overflow-hidden">
                            <div class="p-3 bg-blue-50 text-blue-900 text-sm border-b flex justify-between items-center" role="alert">
                                <span class="flex items-center gap-2 font-medium">
                                    <span class="material-symbols-outlined">accessibility_new</span> 
                                    ¿Usas lector de pantalla?
                                </span>
                                <a href="${textoInput}" target="_blank" aria-label="Abrir documento en nueva pestaña" class="bg-blue-600 text-white px-4 py-1.5 rounded font-bold hover:bg-blue-700 transition-colors">Abrir Documento</a>
                            </div>
                            <object data="${textoInput}" type="application/pdf" width="100%" style="height: 70vh; min-height: 600px;" title="Documento de lectura">
                                <iframe src="${textoInput}" width="100%" style="height: 70vh; min-height: 600px;" title="Documento de lectura"></iframe>
                            </object>
                        </div>`;
                } else {
                    previewContent.innerHTML = `
                        <div class="bg-white p-8 rounded border h-full overflow-y-auto" tabindex="0">
                            <h2 class="text-2xl font-bold mb-4 text-primary">Contenido de Lectura</h2>
                            <p class="text-gray-800 text-lg leading-relaxed whitespace-pre-wrap">${textoInput}</p>
                        </div>`;
                }
            }
            else if (vista === 'bajoconsumo') {
                if (!textoInput) {
                    previewContent.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center h-full bg-white rounded-lg border">
                            <span class="material-symbols-outlined text-5xl text-gray-300 mb-4">bolt</span>
                            <h3 class="text-lg font-bold text-gray-700">Perfil no disponible</h3>
                            <p class="text-sm text-gray-500 max-w-sm mt-2">No se ha ingresado texto para generar la versión de bajo consumo.</p>
                        </div>`;
                } else {
                    previewContent.innerHTML = `
                        <div class="bg-orange-50 border border-orange-200 p-4 rounded mb-4 flex items-center gap-2">
                            <span class="material-symbols-outlined text-orange-500">warning</span>
                            <p class="text-xs font-bold text-orange-800">Modo ahorro de datos activo</p>
                        </div>
                        <div class="bg-white p-4 rounded border flex-1 text-gray-500 text-sm overflow-y-auto">
                            <p>${textoInput}</p>
                        </div>`;
                }
            }
        };
    });

// --- LÓGICA PARA OCULTAR/MOSTRAR FORMULARIO ---
    const btnToggleForm = document.getElementById('btn-toggle-form');
    const colFormulario = document.getElementById('col-formulario');
    const iconToggle = btnToggleForm.querySelector('.material-symbols-outlined');

    btnToggleForm.onclick = () => {
        colFormulario.classList.toggle('hidden');
        if (colFormulario.classList.contains('hidden')) {
            iconToggle.innerText = 'menu';
            btnToggleForm.title = "Mostrar Formulario";
        } else {
            iconToggle.innerText = 'menu_open';
            btnToggleForm.title = "Ocultar Formulario";
        }
    };
    
    // --- 6. BOTÓN COPIAR ---
    btnCopiar.onclick = () => {
        if (!codigoResultado.value) return;
        codigoResultado.select();
        document.execCommand('copy');
        const originalText = btnCopiar.innerText;
        btnCopiar.innerText = "¡Copiado!";
        btnCopiar.classList.replace('bg-secondary', 'bg-green-600');
        setTimeout(() => {
            btnCopiar.innerText = originalText;
            btnCopiar.classList.replace('bg-green-600', 'bg-secondary');
        }, 2000);
    };

    // --- 7. INICIALIZACIÓN ---
    // Añadir un bloque de cada uno por defecto para guiar al usuario
    document.getElementById('btn-add-sena').click();
    document.getElementById('btn-add-pista').click();
});
</script>
</body>
</html>
